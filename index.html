<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mapa de Procesos</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>

:root{

  /* ====================================================== */
  /* COLORES CORPORATIVOS */
  /* ====================================================== */

  --azul:#0f2f57;
  --azul-suave:#edf4fb;

  --verde:#008c72;
  --verde-suave:#e8f8f3;

  --dorado:#c9a646;
  --dorado-suave:#fdf8eb;

  --gris:#374151;
  --gris-nota:#6b7280;
}

/* ====================================================== */
/* GENERAL */
/* ====================================================== */

body{
  margin:0;
  background:#f4f6f8;
  font-family:Arial, Helvetica, sans-serif;
  color:var(--gris);
}

.contenedor{
  max-width:1500px;
  margin:25px auto;
  padding:20px;
}

.titulo{
  text-align:center;
  margin-bottom:30px;
}

.titulo h1{
  margin:0;
  font-size:34px;
  color:var(--azul);
}

.titulo p{
  margin-top:8px;
  color:#64748b;
}

/* ====================================================== */
/* BLOQUES */
/* ====================================================== */

.bloque{
  background:white;
  border-radius:18px;
  padding:22px;
  margin-bottom:30px;
  box-shadow:0 8px 20px rgba(0,0,0,0.06);
}

.bloque h2{
  margin-top:0;
  margin-bottom:20px;
  font-size:20px;
  text-transform:uppercase;
  letter-spacing:1px;
}

/* ====================================================== */
/* ESTRATÉGICOS */
/* ====================================================== */

.estrategico{
  border-left:8px solid var(--azul);
}

.operativo{
  border-left:8px solid var(--verde);
}

.apoyo{
  border-left:8px solid var(--dorado);
  background:var(--dorado-suave);
}

/* ====================================================== */
/* GRID */
/* ====================================================== */

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:16px;
}

/* ====================================================== */
/* TARJETA */
/* ====================================================== */

.proceso{
  background:white;
  border-radius:16px;
  overflow:hidden;
  border:1px solid #dce3ea;
}

/* ====================================================== */
/* HEADER */
/* ====================================================== */

.proceso-header{
  padding:14px 16px;
  display:flex;
  align-items:center;
  gap:10px;
  color:white;
  font-weight:bold;
}

.estrategico .proceso-header{
  background:var(--azul);
}

.operativo .proceso-header{
  background:var(--verde);
}

.numero{
  background:white;
  width:28px;
  height:28px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
}

.estrategico .numero{
  color:var(--azul);
}

.operativo .numero{
  color:var(--verde);
}

/* ====================================================== */
/* SUBPROCESOS */
/* ====================================================== */

.subprocesos{
  padding:14px 16px;
}

.subproceso{
  margin-bottom:10px;
  padding:10px 12px;
  border-radius:10px;
  font-size:15px;
}

.estrategico .subproceso{
  background:var(--azul-suave);
  border-left:4px solid var(--azul);
}

.operativo .subproceso{
  background:var(--verde-suave);
  border-left:4px solid var(--verde);
}

/* ====================================================== */
/* ÁREA EN LATERAL */
/* ====================================================== */

.area-inline{

  margin-left:8px;

  font-size:12px;

  font-style:italic;

  color:var(--gris-nota);
}

/* ====================================================== */
/* APOYO */
/* ====================================================== */

.apoyo-vertical{
  display:flex;
  flex-direction:column;
  gap:10px;
}

.linea-apoyo{

  display:grid;

  grid-template-columns:
      60px
      300px
      1fr;

  align-items:flex-start;

  background:white;

  border:1px solid var(--dorado);

  border-radius:10px;

  padding:12px 16px;
}

/* ====================================================== */
/* NUMERO APOYO */
/* ====================================================== */

.codigo-proceso{

  font-size:22px;

  font-weight:bold;

  color:#9a6a00;
}

/* ====================================================== */
/* TITULO APOYO */
/* ====================================================== */

.titulo-proceso{

  font-size:18px;

  font-weight:bold;

  color:var(--azul);
}

/* ====================================================== */
/* DETALLE APOYO */
/* ====================================================== */

.detalle-proceso{

  font-size:15px;

  color:var(--gris);

  line-height:1.4;
}

/* ====================================================== */
/* SUBPROCESO APOYO */
/* ====================================================== */

.item-apoyo{
  display:inline-flex;
  flex-direction:column;
  align-items:center;
  margin-right:10px;
  margin-bottom:2px;
  white-space:nowrap;
}

/* ====================================================== */
/* ÁREA ABAJO APOYO */
/* ====================================================== */

.area-apoyo{
  display:block;
  margin-top:1px;
  font-size:11px;
  font-style:italic;
  color:#6b7280;
  line-height:1;
}

  .separador-apoyo{
  margin-right:10px;
}
/* ====================================================== */
/* RESPONSIVE */
/* ====================================================== */

@media(max-width:900px){

  .linea-apoyo{
      grid-template-columns:1fr;
      gap:6px;
  }

}

</style>
</head>

<body>

<div class="contenedor">

  <!-- ====================================================== -->
  <!-- TITULO -->
  <!-- ====================================================== -->

  <div class="titulo">

    <h1>Mapa de Procesos</h1>

    <p>
      Representación general de procesos y subprocesos
    </p>

  </div>

  <!-- ====================================================== -->
  <!-- ESTRATEGICOS -->
  <!-- ====================================================== -->

  <section class="bloque estrategico">

    <h2>Procesos Estratégicos</h2>

    <div id="estrategico" class="grid"></div>

  </section>

  <!-- ====================================================== -->
  <!-- OPERATIVOS -->
  <!-- ====================================================== -->

  <section class="bloque operativo">

    <h2>Procesos Operativos</h2>

    <div id="operativo" class="grid"></div>

  </section>

  <!-- ====================================================== -->
  <!-- APOYO -->
  <!-- ====================================================== -->

  <section class="bloque apoyo">

    <h2>Procesos de Apoyo</h2>

    <div id="apoyo" class="apoyo-vertical"></div>

  </section>

</div>

<script>

const ARCHIVO_EXCEL = "mapa_proceso.xlsx";

/* ====================================================== */
/* CARGAR EXCEL */
/* ====================================================== */

async function cargarExcel(){

  const respuesta = await fetch(ARCHIVO_EXCEL);

  const datos = await respuesta.arrayBuffer();

  const libro = XLSX.read(datos,{ type:"array" });

  const hoja = libro.Sheets[libro.SheetNames[0]];

  const filas = XLSX.utils.sheet_to_json(hoja);

  construirMapa(filas);
}

/* ====================================================== */
/* CONSTRUIR */
/* ====================================================== */

function construirMapa(filas){

  const procesos = {};

  filas.forEach(fila => {

    const ordenProceso = Number(fila.orden_proceso);

    if(!procesos[ordenProceso]){

      procesos[ordenProceso] = {

        orden_proceso:ordenProceso,

        proceso_descripcion:fila.proceso_descripcion,

        subprocesos:[]
      };
    }

    procesos[ordenProceso].subprocesos.push({

      orden_subproceso:Number(fila.orden_subproceso),

      subproceso_descripcion:fila.subproceso_descripcion,

      area_descripcion:fila.area_descripcion || ""
    });

  });

  Object.values(procesos)
  .sort((a,b) => a.orden_proceso - b.orden_proceso)
  .forEach(proceso => {

      proceso.subprocesos.sort(
        (a,b) => a.orden_subproceso - b.orden_subproceso
      );

      if(proceso.orden_proceso <= 3){

        pintarTarjeta(proceso,"estrategico");

      }else if(proceso.orden_proceso <= 6){

        pintarTarjeta(proceso,"operativo");

      }else{

        pintarApoyo(proceso);
      }

  });

}

/* ====================================================== */
/* TARJETAS */
/* ====================================================== */

function pintarTarjeta(proceso,contenedorId){

  const contenedor = document.getElementById(contenedorId);

  let htmlSub = "";

  proceso.subprocesos.forEach(sub => {

    htmlSub += `
      <div class="subproceso">

        ${sub.orden_subproceso}. ${sub.subproceso_descripcion}

        <span class="area-inline">
          (${sub.area_descripcion})
        </span>

      </div>
    `;
  });

  const div = document.createElement("div");

  div.className = "proceso";

  div.innerHTML = `

    <div class="proceso-header">

      <span class="numero">
        ${proceso.orden_proceso}
      </span>

      ${proceso.proceso_descripcion}

    </div>

    <div class="subprocesos">

      ${htmlSub}

    </div>

  `;

  contenedor.appendChild(div);
}

/* ====================================================== */
/* APOYO */
/* ====================================================== */

function pintarApoyo(proceso){

  const contenedor = document.getElementById("apoyo");

  let detalle = "— ";

  proceso.subprocesos.forEach((sub, index) => {

    if(index > 0){
      detalle += `<span class="separador-apoyo"> · </span>`;
    }

    detalle += `
      <span class="item-apoyo">
        <span>${sub.subproceso_descripcion}</span>
        <span class="area-apoyo">(${sub.area_descripcion})</span>
      </span>
    `;
  });

  const div = document.createElement("div");

  div.className = "linea-apoyo";

  div.innerHTML = `

    <div class="codigo-proceso">
      ${proceso.orden_proceso}.
    </div>

    <div class="titulo-proceso">
      ${proceso.proceso_descripcion}
    </div>

    <div class="detalle-proceso">
      ${detalle}
    </div>

  `;

  contenedor.appendChild(div);
}

/* ====================================================== */
/* INICIO */
/* ====================================================== */

cargarExcel();

</script>

</body>
</html>
